name: Build and Release

on:
  workflow_dispatch:
    inputs:
      beta:
        type: boolean
        description: Is beta?

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter Doctor
        id: flutter_doctor
        run: |
          flutter doctor -v

      - name: Check submodule
        id: check_submodule
        run: |
          git checkout ${{ inputs.checkout }}

      - name: Extract Version
        id: extract_version      
        run: |
          VERSION=$(grep -oP "^version: [^\+]+" pubspec.yaml | tail -c +10)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [ ${{ inputs.beta }} == true ]; then BETA=true; else BETA=false; fi
          echo "beta=$BETA" >> $GITHUB_OUTPUT
          TAG="v$VERSION"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build normal APKs
        run: |
          flutter build apk --flavor normal --debug
          flutter build apk --split-per-abi --flavor normal --debug
          echo "--- APK output after normal build ---"
          find build/app/outputs -name "*.apk" 2>/dev/null || echo "No APKs found"
          for file in build/app/outputs/flutter-apk/app-*normal*.apk; do
            [ -e "$file" ] && mv "$file" "${file//-normal/}" || true
          done

      - name: Build fdroid APKs
        run: |
          flutter build apk --flavor fdroid --debug -t lib/main_fdroid.dart --verbose || true
          flutter build apk --split-per-abi --flavor fdroid --debug -t lib/main_fdroid.dart --verbose || true
          echo "--- APK output after fdroid build ---"
          find build/app/outputs -name "*.apk" 2>/dev/null || echo "No fdroid APKs found"

      - name: Collect artifacts
        run: |
          find build/app/outputs/flutter-apk -name "*.sha1" -delete 2>/dev/null || true
          cp ./sign.sh ./build/app/outputs/flutter-apk/ 2>/dev/null || true
          ls -l ./build/app/outputs/flutter-apk/

      - name: Save Unsigned APKs as Action Artifacts
        uses: actions/upload-artifact@v4
        with:
          path: build/app/outputs/flutter-apk/*

      - name: Create Tag
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GH_ACCESS_TOKEN }}
          custom_tag: "${{ steps.extract_version.outputs.tag }}"
          tag_prefix: ""
      
      - name: Create Draft Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}
          tag: "${{ steps.extract_version.outputs.tag }}"
          prerelease: "${{ steps.extract_version.outputs.beta }}"
          draft: "true"
          generateReleaseNotes: true
